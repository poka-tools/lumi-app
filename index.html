<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <!-- CSP: 自オリジン以外への通信・外部スクリプト読込を禁止（GitHub Pages はHTTPヘッダ不可のため meta で指定）。
       inline style を多用しているため style-src には 'unsafe-inline' が必要。script は外部ESMモジュールのみ。 -->
  <!-- frame-ancestors/sandbox/report-uri は meta では無視される（HTTPヘッダー専用）ため指定しない。
       GitHub Pages はヘッダー設定不可なので、それらはそもそも適用できない。 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5c8a" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Lumi</title>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="splash-inner">
      <img class="splash-logo" src="assets/logo.png" alt="Lumi 夜職の給与管理アプリ" />
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <main id="screen"></main>
  <nav id="tabbar">
    <button data-tab="home" class="active">🏠<span>ホーム</span></button>
    <button data-tab="calendar">📅<span>カレンダー</span></button>
    <button data-tab="record" class="fab">＋</button>
    <button data-tab="report">📊<span>レポート</span></button>
    <button data-tab="customers">👤<span>顧客</span></button>
  </nav>
  <script type="module" src="js/app.js"></script>
</body>
</html>
